services:
  - type: web
    name: personal-fitness-os
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_ENDPOINT
        sync: false
      - key: OLLAMA_MODEL
        sync: false
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
