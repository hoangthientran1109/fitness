services:
  - type: web
    name: personal-fitness-os
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && next start -p ${PORT:-3000}
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_ENDPOINT
        sync: false
      - key: OLLAMA_MODEL
        sync: false
